<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>Site do Gui</title>

    <style>
        body{
            font-family: Arial, sans-serif;
            background:#f0f2f5;
            text-align:center;
            padding:50px;
        }

        .caixa{
            background:white;
            padding:30px;
            border-radius:15px;
            width:500px;
            margin:auto;
            box-shadow:0 0 15px rgba(0,0,0,0.1);
        }

        h1{
            color:#007bff;
        }

        button{
            background:#007bff;
            color:white;
            border:none;
            padding:12px 20px;
            border-radius:8px;
            cursor:pointer;
        }

        button:hover{
            background:#0056b3;
        }
    </style>
</head>
<body>

<div class="caixa">
    <h1>amo a eloysa</h1>

    <p>Olá! Estou aprendendo programação.</p>

    <button onclick="clicou()">
        Não clique 
    </button>
</div>

<script>
function clicou(){
    alert("Parabéns! Você acessou meu primeiro site")
}
</script>

</body>
</html>
